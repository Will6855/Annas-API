openapi: 3.0.3
info:
  title: Anna's Archive API
  description: |
    A RESTful API to search and retrieve book metadata from Anna's Archive.
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      # Note: BearerAuth also accepts API keys with the prefix aa_sk_
      # (e.g. "Bearer aa_sk_Xk3mR9vTqL2nPwYdJcBsHfUeAiOgMzNl").
      # Both JWT and API keys resolve to the same user with the same permissions.

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time
        rateLimitBookDetail:
          type: integer
          description: Max requests per minute for /api/book/:md5 (book detail). -1 = unlimited, 0 = blocked.
          default: -1
        rateLimitBookDownload:
          type: integer
          description: Max requests per minute for /api/book/:md5/download. -1 = unlimited, 0 = blocked.
          default: -1
        rateLimitBookRelated:
          type: integer
          description: Max requests per minute for /api/book/:md5/related. -1 = unlimited, 0 = blocked.
          default: -1
        rateLimitSearch:
          type: integer
          description: Max requests per minute for /api/search. -1 = unlimited, 0 = blocked.
          default: -1

    ApiUsageRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        endpoint:
          type: string
        method:
          type: string
        ip:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    BookSummary:
      type: object
      properties:
        md5:
          type: string
          description: 32-character MD5 hash
        title:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        year:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        extension:
          type: string
          nullable: true
        filesize:
          type: string
          nullable: true
          description: Human-readable filesize (e.g. "0.6 MB")
        description:
          type: string
          nullable: true
        cover:
          type: string
          nullable: true
          description: Cover image URL
        filename:
          type: string
          nullable: true
        downloads:
          type: integer
          nullable: true
        lists:
          type: integer
          nullable: true
        bookType:
          type: string
          nullable: true
          description: Content category (e.g. "Book (fiction)")
        hasIssues:
          type: boolean
        url:
          type: string
          description: Full URL to the book detail page

    BookDetail:
      type: object
      properties:
        md5:
          type: string
          description: 32-character MD5 hash
        title:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        year:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        extension:
          type: string
          nullable: true
        filesize:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cover:
          type: string
          nullable: true
        collections:
          type: array
          items:
            type: string
        contentType:
          type: string
          nullable: true
        zlibId:
          type: string
          nullable: true
        isbn:
          type: array
          items:
            type: string
        ipfsCids:
          type: array
          items:
            type: string
        filepaths:
          type: array
          items:
            type: string
        url:
          type: string
        downloadLinks:
          $ref: '#/components/schemas/BookDownloadLinks'
        metadata:
          type: object
          description: Variable key-value metadata bag. Keys are dynamic (e.g. sha256, asin, series, dates, identifiers, etc.)
          additionalProperties: true

    BookResponse:
      type: object
      properties:
        success:
          type: boolean
        md5:
          type: string
        book:
          $ref: '#/components/schemas/BookDetail'
        domain:
          type: string
        cached:
          type: boolean
        responseTime:
          type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    LinkStatus:
      type: object
      properties:
        label:
          type: string
          description: Display label for the link
        url:
          type: string
          description: The download URL

    BookDownloadLinks:
      type: object
      properties:
        fast:
          type: array
          items:
            $ref: '#/components/schemas/LinkStatus'
        slow:
          type: array
          items:
            $ref: '#/components/schemas/LinkStatus'
        external:
          type: array
          items:
            $ref: '#/components/schemas/LinkStatus'

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Internal ID of the API key record
        key:
          type: string
          description: The raw API key (only shown once on creation)
        keyPrefix:
          type: string
          description: Truncated prefix for identification (e.g. "aa_sk_Xk3mR9...")
        name:
          type: string
          nullable: true
          description: Optional human-readable label for the key
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of last use
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when the key is revoked

    ApiKeyCreated:
      type: object
      properties:
        success:
          type: boolean
        apiKey:
          $ref: '#/components/schemas/ApiKey'

    ApiKeyList:
      type: object
      properties:
        success:
          type: boolean
        apiKeys:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: User login
      description: Exchange credentials for a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Admin only. Create a new user account.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                  default: user
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
        '403':
          description: Forbidden (Admin role required)

  /api/auth/users:
    get:
      tags: [Auth]
      summary: List all users
      description: Admin only. Retrieve a list of all registered users.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  /api/auth/users/{id}:
    put:
      tags: [Auth]
      summary: Update a user
      description: Admin only. Update username, password, or role of an existing user.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                rateLimitBookDetail:
                  type: integer
                  description: Max requests per minute for /api/book/:md5. -1 = unlimited, 0 = blocked.
                rateLimitBookDownload:
                  type: integer
                  description: Max requests per minute for /api/book/:md5/download. -1 = unlimited, 0 = blocked.
                rateLimitBookRelated:
                  type: integer
                  description: Max requests per minute for /api/book/:md5/related. -1 = unlimited, 0 = blocked.
                rateLimitSearch:
                  type: integer
                  description: Max requests per minute for /api/search. -1 = unlimited, 0 = blocked.
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found

  /api/auth/me:
    get:
      tags: [Auth]
      summary: View own account
      description: Retrieve your own account details and current rate limit usage progress.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
                  rateLimits:
                    type: object
                    properties:
                      bookDetail:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                      bookDownload:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                      bookRelated:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                      search:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
        '401':
          description: Unauthorized

  /api/auth/users/{id}/usage:
    get:
      tags: [Auth]
      summary: View user API usage
      description: Admin only. Retrieve paginated API usage records and current rate limit usage for a specific user.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Max records to return (max 500)
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          description: Number of records to skip
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Usage records
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
                  rateLimits:
                    type: object
                    properties:
                      bookDetail:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                      bookDownload:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                      bookRelated:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                      search:
                        type: object
                        properties:
                          limit:
                            type: integer
                            nullable: true
                          current:
                            type: integer
                  usage:
                    type: object
                    properties:
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                      records:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiUsageRecord'
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: User not found

  # ────────────────────────────────────────────────────────────────────────
  # API Key Management
  # ────────────────────────────────────────────────────────────────────────

  /api/auth/api-keys:
    post:
      tags: [Auth]
      summary: Create an API key
      description: |
        Authenticated users can create an API key as an alternative to JWT authentication.
        The raw key is shown exactly once in the response — it cannot be retrieved again.
        Store it securely. Key format: aa_sk_<base64url>.
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Optional label for the key
      responses:
        '201':
          description: API key created — raw key shown once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreated'
        '401':
          description: Unauthorized

    get:
      tags: [Auth]
      summary: List own API keys
      description: Returns metadata (prefix, name, dates) for all API keys belonging to the authenticated user. Full keys and hashes are never exposed.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyList'
        '401':
          description: Unauthorized

  /api/auth/api-keys/{id}:
    delete:
      tags: [Auth]
      summary: Revoke an API key
      description: Revoke one of your own API keys by ID. Once revoked, the key can no longer be used for authentication.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the API key to revoke
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: API key is already revoked
        '401':
          description: Unauthorized
        '404':
          description: API key not found

  /api/auth/users/{id}/api-keys:
    get:
      tags: [Auth]
      summary: List user API keys (admin)
      description: Admin only. Retrieve metadata for all API keys belonging to a specific user.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the user
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User's API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyList'
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: User not found

  /api/search:
    get:
      tags: [Search]
      summary: Search for books
      description: Search Anna's Archive with filters and advanced search options.
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search query string (optional — blank searches are allowed)
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: lang
          in: query
          description: Language filter (e.g., "en")
          schema:
            type: string
        - name: ext
          in: query
          description: File extension filter (e.g., "pdf")
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order for results
          schema:
            type: string
            enum: [most_relevant, newest, oldest, largest, smallest, newest_added, oldest_added, random]
            default: most_relevant
        - name: content
          in: query
          description: Content type filter
          schema:
            type: string
            enum: [book_any, book_fiction, book_nonfiction, magazine, standards_document, comics, other]
        - name: index
          in: query
          description: Source index filter
          schema:
            type: string
            enum: [journals, digital_lending, meta]
        - name: termtype_1
          in: query
          description: First advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_1
          in: query
          description: First advanced search field value
          schema:
            type: string
        - name: termtype_2
          in: query
          description: Second advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_2
          in: query
          description: Second advanced search field value
          schema:
            type: string
        - name: termtype_3
          in: query
          description: Third advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_3
          in: query
          description: Third advanced search field value
          schema:
            type: string
        - name: termtype_4
          in: query
          description: Fourth advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_4
          in: query
          description: Fourth advanced search field value
          schema:
            type: string
        - name: termtype_5
          in: query
          description: Fifth advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_5
          in: query
          description: Fifth advanced search field value
          schema:
            type: string
        - name: termtype_6
          in: query
          description: Sixth advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_6
          in: query
          description: Sixth advanced search field value
          schema:
            type: string
        - name: termtype_7
          in: query
          description: Seventh advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_7
          in: query
          description: Seventh advanced search field value
          schema:
            type: string
        - name: termtype_8
          in: query
          description: Eighth advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_8
          in: query
          description: Eighth advanced search field value
          schema:
            type: string
        - name: termtype_9
          in: query
          description: Ninth advanced search field type
          schema:
            type: string
            enum: [title, author, publisher, edition_varia, year, original_filename, description_comments]
        - name: termval_9
          in: query
          description: Ninth advanced search field value
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  query:
                    type: string
                  page:
                    type: integer
                  count:
                    type: integer
                  filters:
                    type: object
                    description: Active filters (including advanced search fields if provided)
                  results:
                    type: object
                    properties:
                      primary:
                        type: array
                        items:
                          $ref: '#/components/schemas/BookSummary'
                      partial:
                        type: array
                        items:
                          $ref: '#/components/schemas/BookSummary'
                  cached:
                    type: boolean
                  responseTime:
                    type: integer

  /api/book/{md5}:
    get:
      tags: [Book]
      summary: Get book details
      description: Fetch full metadata and download links for a specific book.
      security:
        - BearerAuth: []
      parameters:
        - name: md5
          in: path
          required: true
          description: 32-character MD5 hash of the book
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
        - name: refresh
          in: query
          description: Bypass cache and force a fresh scrape
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Book details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponse'
        '404':
          description: Book not found

  /api/book/{md5}/related:
    get:
      tags: [Book]
      summary: Get related books
      description: Fetch similar books based on author, tags, and title keywords.
      security:
        - BearerAuth: []
      parameters:
        - name: md5
          in: path
          required: true
          description: 32-character MD5 hash of the source book
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
        - name: limit
          in: query
          description: Max results (1-50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: lang
          in: query
          description: Override language filter
          schema:
            type: string
        - name: ext
          in: query
          description: Restrict to file extension
          schema:
            type: string
        - name: refresh
          in: query
          description: Bypass cache
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of related books
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookSummary'

  /api/book/{md5}/download:
    get:
      tags: [Book]
      summary: Download a book
      description: |
        Download a book file. The default "auto" mode tries Libgen mirrors first
        and automatically falls back to slow servers if Libgen fails.
        "libgen" forces Libgen-only (no fallback) and "slow" forces slow servers.
      security:
        - BearerAuth: []
      parameters:
        - name: md5
          in: path
          required: true
          description: 32-character MD5 hash of the book
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
        - name: source
          in: query
          description: |
            Download source strategy. "auto" (default) tries libgen first, 
            then falls back to slow servers if libgen fails.
            "libgen" uses external Libgen mirrors only.
            "slow" uses Anna's Archive slow servers only (tries all links until success).
          schema:
            type: string
            enum: [auto, slow, libgen]
            default: auto
        - name: refresh
          in: query
          description: Bypass cache and force a fresh metadata scrape before downloading
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: File download stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid MD5 or source parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found or no download links available for the requested source
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                  md5:
                    type: string
                  source:
                    type: string
        '502':
          description: Download failed (all links exhausted or streaming error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                  md5:
                    type: string
                  source:
                    type: string

  /health:
    get:
      tags: [System]
      summary: API Health status
      description: |
        Returns system health info: uptime, memory usage, domain status, cache statistics, and browser pool state.
        Domain status is cached and only refreshed every 10 minutes server-side. Uptime, memory, cache stats, and domain down status are live per request.
      responses:
        '200':
          description: System health info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: string
                    description: Server uptime (recalculated per request)
                    example: 3600s
                  serverStartTime:
                    type: string
                    format: date-time
                    description: ISO timestamp of when the server was started (recorded at module load)
                    example: "2026-05-30T12:00:00.000Z"
                  memory:
                    type: object
                    description: Live memory usage (recalculated per request)
                    properties:
                      rss:
                        type: string
                        example: 150.5 MB
                      heapUsed:
                        type: string
                        example: 80.2 MB
                      heapTotal:
                        type: string
                        example: 120.0 MB
                      external:
                        type: string
                        example: 5.3 MB
                  domains:
                    type: array
                    items:
                      type: object
                      properties:
                        domain:
                          type: string
                          example: annas-archive.org
                        status:
                          type: string
                          enum: [up, down]
                        lastChecked:
                          type: string
                          format: date-time
                          nullable: true
                        lastError:
                          type: string
                          nullable: true
                  cache:
                    type: object
                    description: Live cache statistics (recalculated per request)
                    properties:
                      type:
                        type: string
                        example: memory
                      search:
                        type: object
                        properties:
                          keys:
                            type: integer
                          hits:
                            type: integer
                          misses:
                            type: integer
                      book:
                        type: object
                        properties:
                          keys:
                            type: integer
                          hits:
                            type: integer
                          misses:
                            type: integer
                      related:
                        type: object
                        properties:
                          keys:
                            type: integer
                          hits:
                            type: integer
                          misses:
                            type: integer
                      totalHits:
                        type: integer
                      totalMisses:
                        type: integer
                  browserPool:
                    type: object
                    properties:
                      total:
                        type: integer
                      available:
                        type: integer
                      inUse:
                        type: integer
                      waiting:
                        type: integer
                  lastActualized:
                    type: string
                    format: date-time
                    description: When domain status was last refreshed (every 10 min)
                  timeUntilNextUpdate:
                    type: string
                    description: Seconds until next 10-minute refresh
                    example: 467s
                  timestamp:
                    type: string
                    format: date-time
                    description: Current server timestamp

  /api/cache:
    delete:
      tags: [System]
      summary: Flush API cache
      description: Admin only. Clear all cached search and book data.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cache cleared successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
